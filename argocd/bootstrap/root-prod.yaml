apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: belovr-root-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: belovr-platform
    belovr.io/environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/nicolasdemol/belovr-cluster.git
    targetRevision: main
    path: environments/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
