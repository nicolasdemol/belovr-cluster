apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: belovr-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  labels:
    app.kubernetes.io/part-of: belovr-platform
spec:
  description: Core platform services for the Belovr cluster.
  sourceRepos:
    - https://github.com/nicolasdemol/belovr-cluster.git
    - https://qdrant.github.io/qdrant-helm
    - https://charts.bitnami.com/bitnami
    - https://prometheus-community.github.io/helm-charts
    - https://grafana.github.io/helm-charts
    - https://open-telemetry.github.io/opentelemetry-helm-charts
    - oci://ghcr.io/cloudpirates-io/helm-charts/keycloak
    - oci://ghcr.io/cloudpirates-io/helm-charts/rabbitmq
  destinations:
    - namespace: belovr
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: observability
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
