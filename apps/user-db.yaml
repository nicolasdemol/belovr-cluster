apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-db
  namespace: argocd
spec:
  project: default

  source:
    repoURL: registry-1.docker.io
    targetRevision: "18.1.8"
    path: bitnamicharts/postgresql
    helm:
      valuesObject:
        auth:
          username: user
          password: userpass
          database: user
        primary:
          persistence:
            enabled: true
            size: 2Gi
            storageClass: microk8s-hostpath

  destination:
    server: https://kubernetes.default.svc
    namespace: belovr

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
