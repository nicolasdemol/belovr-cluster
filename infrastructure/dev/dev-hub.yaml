apiVersion: apps/v1
kind: Deployment
metadata:
  name: belovr-dev-hub
  namespace: belovr
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: belovr-dev-hub
    app.kubernetes.io/part-of: belovr-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: belovr-dev-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: belovr-dev-hub
        app.kubernetes.io/part-of: belovr-platform
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
---
apiVersion: v1
kind: Service
metadata:
  name: belovr-dev-service
  namespace: belovr
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: belovr-dev-service
    app.kubernetes.io/part-of: belovr-platform
spec:
  selector:
    app.kubernetes.io/name: belovr-dev-hub
  ports:
    - name: frontend
      port: 3000
      targetPort: 3000
    - name: auth
      port: 3001
      targetPort: 3001
    - name: admin
      port: 3002
      targetPort: 3002
    - name: user
      port: 4000
      targetPort: 4000
    - name: content
      port: 4100
      targetPort: 4100
    - name: chat
      port: 4200
      targetPort: 4200
    - name: social
      port: 4300
      targetPort: 4300
    - name: payment
      port: 4400
      targetPort: 4400
    - name: realtime
      port: 4500
      targetPort: 4500
    - name: ia
      port: 8080
      targetPort: 8080
