apiVersion: v1
kind: ConfigMap
metadata:
  name: belovr-dashboard-chat
  namespace: observability
  annotations:
    grafana_folder: Belovr
    argocd.argoproj.io/sync-wave: "40"
  labels:
    grafana_dashboard: "1"
data:
  belovr-chat.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(belovr_chat_messages_received_total[5m]))",
              "legendFormat": "received",
              "refId": "A"
            },
            {
              "expr": "sum(increase(belovr_chat_messages_broadcast_total[5m]))",
              "legendFormat": "broadcast",
              "refId": "B"
            }
          ],
          "title": "Messages recus vs diffuses",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(belovr_chat_broadcast_failures_total[5m]))",
              "legendFormat": "broadcast failures",
              "refId": "A"
            }
          ],
          "title": "Echecs de diffusion",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (queue) (rabbitmq_queue_messages_ready{namespace=\"belovr\",queue=~\".*chat.*\"})",
              "legendFormat": "{{ queue }} ready",
              "refId": "A"
            }
          ],
          "title": "Backlog RabbitMQ chat",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${loki}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{k8s_namespace_name=\"belovr\"} |= \"chat\"",
              "refId": "A"
            }
          ],
          "title": "Logs chat",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "belovr",
        "chat"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "name": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {
              "text": "Loki",
              "value": "Loki"
            },
            "name": "loki",
            "query": "loki",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Belovr - Chat",
      "uid": "belovr-chat",
      "version": 1,
      "weekStart": ""
    }
