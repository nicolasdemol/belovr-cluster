apiVersion: v1
kind: ConfigMap
metadata:
  name: belovr-dashboard-payments
  namespace: observability
  annotations:
    grafana_folder: Belovr
    argocd.argoproj.io/sync-wave: "40"
  labels:
    grafana_dashboard: "1"
data:
  belovr-payments.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(belovr_payment_paid_total[5m]))",
              "legendFormat": "paid",
              "refId": "A"
            },
            {
              "expr": "sum(increase(belovr_payment_credited_total[5m]))",
              "legendFormat": "credited",
              "refId": "B"
            }
          ],
          "title": "Paiements payes vs credites",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(belovr_payment_credit_failures_total[10m]))",
              "legendFormat": "credit failures",
              "refId": "A"
            },
            {
              "expr": "sum(increase(belovr_payment_paid_total[15m])) - sum(increase(belovr_payment_credited_total[15m]))",
              "legendFormat": "credit gap",
              "refId": "B"
            }
          ],
          "title": "Credits manquants",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (route, status_code) (rate(http_requests_total{namespace=\"belovr\",service=~\".*payment.*\"}[5m]))",
              "legendFormat": "{{ route }} {{ status_code }}",
              "refId": "A"
            }
          ],
          "title": "API paiement",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${loki}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{k8s_namespace_name=\"belovr\"} |= \"payment\"",
              "refId": "A"
            }
          ],
          "title": "Logs paiement",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "belovr",
        "payments"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "name": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {
              "text": "Loki",
              "value": "Loki"
            },
            "name": "loki",
            "query": "loki",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Belovr - Payments",
      "uid": "belovr-payments",
      "version": 1,
      "weekStart": ""
    }
