apiVersion: v1
kind: ConfigMap
metadata:
  name: belovr-dashboard-auth
  namespace: observability
  annotations:
    grafana_folder: Belovr
    argocd.argoproj.io/sync-wave: "40"
  labels:
    grafana_dashboard: "1"
data:
  belovr-auth.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (service, status_code) (rate(http_requests_total{namespace=\"belovr\",status_code=~\"401|403\"}[5m]))",
              "legendFormat": "{{ service }} {{ status_code }}",
              "refId": "A"
            }
          ],
          "title": "401/403 par service",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (reason, service) (rate(belovr_auth_invalid_token_total[5m]))",
              "legendFormat": "{{ service }} {{ reason }}",
              "refId": "A"
            }
          ],
          "title": "Tokens invalides",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "up{namespace=\"belovr\",service=~\".*keycloak.*\"}",
              "legendFormat": "{{ service }}",
              "refId": "A"
            }
          ],
          "title": "Disponibilite Keycloak",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${loki}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{k8s_namespace_name=\"belovr\"} |~ \"token|jwt|auth|401|403\"",
              "refId": "A"
            }
          ],
          "title": "Logs auth",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "belovr",
        "auth"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "name": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {
              "text": "Loki",
              "value": "Loki"
            },
            "name": "loki",
            "query": "loki",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Belovr - Auth",
      "uid": "belovr-auth",
      "version": 1,
      "weekStart": ""
    }
