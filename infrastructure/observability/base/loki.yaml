apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: belovr-platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "6.55.0"
    helm:
      releaseName: loki
      valuesObject:
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storage:
            type: filesystem
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 168h
          compactor:
            retention_enabled: true
            delete_request_store: filesystem
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: microk8s-hostpath
            size: 10Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
        gateway:
          enabled: true
          replicas: 1
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        test:
          enabled: false
        lokiCanary:
          enabled: false
        monitoring:
          serviceMonitor:
            enabled: true
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
        sidecar:
          skipTlsVerify: true
          rules:
            enabled: false
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0
        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0
        bloomPlanner:
          replicas: 0
        bloomBuilder:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
      - PruneLast=true
