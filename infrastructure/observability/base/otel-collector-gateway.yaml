apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: belovr-platform
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: "0.150.1"
    helm:
      releaseName: otel-collector-gateway
      valuesObject:
        fullnameOverride: otel-collector-gateway
        mode: deployment
        replicaCount: 2
        image:
          repository: otel/opentelemetry-collector-contrib
        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP
          metrics:
            enabled: true
            containerPort: 8888
            servicePort: 8888
            protocol: TCP
          prometheus:
            enabled: true
            containerPort: 8889
            servicePort: 8889
            protocol: TCP
          jaeger-compact:
            enabled: false
          jaeger-thrift:
            enabled: false
          jaeger-grpc:
            enabled: false
          zipkin:
            enabled: false
        serviceMonitor:
          enabled: true
          metricsEndpoints:
            - port: metrics
            - port: prometheus
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 1Gi
        alternateConfig:
          extensions:
            health_check:
              endpoint: ${env:MY_POD_IP}:13133
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: ${env:MY_POD_IP}:4317
                http:
                  endpoint: ${env:MY_POD_IP}:4318
          processors:
            memory_limiter:
              check_interval: 5s
              limit_percentage: 80
              spike_limit_percentage: 25
            resource/belovr:
              attributes:
                - key: deployment.environment
                  value: cluster
                  action: upsert
                - key: service.namespace
                  value: belovr
                  action: insert
            transform/logs:
              error_mode: ignore
              log_statements:
                - context: log
                  statements:
                    - set(severity_text, attributes["level"]) where severity_text == nil and attributes["level"] != nil
                    - set(attributes["service"], resource.attributes["service.name"]) where attributes["service"] == nil and resource.attributes["service.name"] != nil
                    - set(attributes["request_id"], attributes["requestId"]) where attributes["request_id"] == nil and attributes["requestId"] != nil
            batch:
              timeout: 5s
              send_batch_size: 1024
          exporters:
            otlphttp/loki:
              logs_endpoint: http://loki-gateway.observability.svc.cluster.local/otlp/v1/logs
            prometheus/app:
              endpoint: ${env:MY_POD_IP}:8889
              const_labels:
                cluster: belovr
            debug:
              verbosity: basic
          service:
            extensions:
              - health_check
            pipelines:
              traces:
                receivers:
                  - otlp
                processors:
                  - memory_limiter
                  - resource/belovr
                  - batch
                exporters:
                  - debug
              metrics:
                receivers:
                  - otlp
                processors:
                  - memory_limiter
                  - resource/belovr
                  - batch
                exporters:
                  - prometheus/app
              logs:
                receivers:
                  - otlp
                processors:
                  - memory_limiter
                  - resource/belovr
                  - transform/logs
                  - batch
                exporters:
                  - otlphttp/loki
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
