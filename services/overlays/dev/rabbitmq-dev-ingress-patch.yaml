apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq
spec:
  source:
    helm:
      valuesObject:
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: rabbitmq.192.168.1.12.nip.io
              paths:
                - path: /
                  pathType: Prefix
          tls: []
          annotations:
            kubernetes.io/ingress.class: nginx
