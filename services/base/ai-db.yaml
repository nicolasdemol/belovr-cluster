apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-db
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: belovr-platform
  source:
    repoURL: https://qdrant.github.io/qdrant-helm
    chart: qdrant
    targetRevision: "1.16.0"
    helm:
      releaseName: ai-db
      valuesObject:
        config:
          log_level: INFO
          storage:
            on_disk: true
            storage_path: /qdrant/storage
          cluster:
            enabled: false
          snapshots:
            enabled: true
        primary:
          persistence:
            enabled: true
            size: 5Gi
            storageClass: microk8s-hostpath
        service:
          type: ClusterIP
          httpPort: 6333
          grpcPort: 6334
          p2pPort: 6335
          internalPort: 6336
          k8sProbePort: 6337
          debugPort: 6339
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: belovr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
