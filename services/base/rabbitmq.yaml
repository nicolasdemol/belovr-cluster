apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: belovr-platform
  source:
    repoURL: oci://ghcr.io/cloudpirates-io/helm-charts/rabbitmq
    targetRevision: "0.7.8"
    path: .
    helm:
      releaseName: rabbitmq
      valuesObject:
        auth:
          enabled: true
          username: rabbitmq
          password: rabbitmqpass
          erlangCookie: myerlangcookie123
        persistence:
          enabled: true
          storageClass: microk8s-hostpath
          size: 2Gi
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            interval: 30s
            scrapeTimeout: 10s
            path: /metrics
        ingress:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: belovr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
      - PruneLast=true
